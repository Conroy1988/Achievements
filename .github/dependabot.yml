version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:45"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      jekyll-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
