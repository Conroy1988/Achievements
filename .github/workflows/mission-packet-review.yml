name: Mission packet review

on:
  pull_request:
    paths:
      - 'data/mission-review-policy.json'
      - 'data/mission-review.schema.json'
      - 'triage/mission-drafts/**'
      - 'reviews/mission/**'
      - 'api/mission-review-queue.json'
      - 'api/mission-review-schema.json'
      - 'docs/mission-review-queue.md'
      - 'scripts/build_mission_review_queue.py'
      - 'tests/test_mission_review_queue.py'
      - '.github/workflows/mission-packet-review.yml'
  push:
    branches:
      - main
    paths:
      - 'data/mission-review-policy.json'
      - 'data/mission-review.schema.json'
      - 'triage/mission-drafts/**'
      - 'reviews/mission/**'
      - 'api/mission-review-queue.json'
      - 'api/mission-review-schema.json'
      - 'docs/mission-review-queue.md'
      - 'scripts/build_mission_review_queue.py'
      - 'tests/test_mission_review_queue.py'
      - '.github/workflows/mission-packet-review.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate mission packet reviews
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Validate review queue and generated outputs
        run: python scripts/build_mission_review_queue.py --check --report mission-review-report.md
      - name: Run mission review tests
        run: python -m unittest tests/test_mission_review_queue.py -v
      - name: Upload review validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mission-packet-review-validation
          path: mission-review-report.md
          if-no-files-found: warn
          retention-days: 30
