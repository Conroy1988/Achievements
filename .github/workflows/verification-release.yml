name: Verification release

on:
  pull_request:
    paths:
      - 'CHANGELOG.md'
      - 'docs/releases/**'
      - 'api/**'
      - 'scripts/build_public_api.py'
      - 'scripts/repository_audit.py'
      - '.github/workflows/verification-release.yml'
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
      - 'docs/releases/**'
      - 'api/**'
      - 'scripts/build_public_api.py'
      - 'scripts/repository_audit.py'
      - '.github/workflows/verification-release.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read

jobs:
  validate:
    name: Validate formal release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Validate release note names
        shell: bash
        run: |
          shopt -s nullglob
          notes=(docs/releases/v*.md)
          if (( ${#notes[@]} == 0 )); then
            echo "No versioned release notes were found."
            exit 1
          fi
          for file in "${notes[@]}"; do
            tag="$(basename "$file" .md)"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid semantic-version release note: $file"
              exit 1
            fi
          done
      - name: Set up Ruby and GitHub Pages dependencies
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Install browser dependencies
        run: npm install --no-package-lock
      - name: Install Chromium
        run: |
          if ! npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1; then
            cat /tmp/playwright-install.log
            exit 1
          fi
          tail -n 12 /tmp/playwright-install.log
      - name: Run unified release audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/repository_audit.py \
            --markdown verification-release-audit.md \
            --json verification-release-audit.json \
            --artifacts verification-release-artifacts
      - name: Validate public API drift
        run: |
          set +e
          python scripts/build_public_api.py --check 2>&1 | tee public-api-validation.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verification-release-evidence
          path: |
            verification-release-audit.md
            verification-release-audit.json
            verification-release-artifacts
            public-api-validation.log
            search-test-results
            visual-results
          if-no-files-found: warn
          retention-days: 90

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Publish newly merged release notes
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" -- 'docs/releases/v*.md')
          if (( ${#files[@]} == 0 )); then
            echo "No new release note was merged; nothing to publish."
            exit 0
          fi
          for file in "${files[@]}"; do
            tag="$(basename "$file" .md)"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Refusing invalid release tag: $tag"
              exit 1
            fi
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
              echo "Release $tag already exists; tags are treated as immutable."
              continue
            fi
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "GitHub Achievement Encyclopedia $tag" \
              --notes-file "$file"
          done