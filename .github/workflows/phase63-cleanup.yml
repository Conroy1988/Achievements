name: Phase 63 branch cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/official-achievement-fragment-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/official-achievement-fragment-recovery
          fetch-depth: 0
      - name: Remove transient reconciliation reports
        run: |
          rm -f \
            acquisition-missions-report.md \
            evidence-intelligence-report.md \
            evidence-operations-report.md \
            evidence-quality-programme-report.md \
            evidence-register-report.md \
            mission-intake-report.md \
            mission-review-report.md \
            official-achievement-fragments-report.md \
            phase63-reconcile.log \
            promotion-planner-report.md \
            research-intelligence-report.md
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No cleanup required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 63: remove reconciliation transport files"
          git push origin HEAD:agent/official-achievement-fragment-recovery
