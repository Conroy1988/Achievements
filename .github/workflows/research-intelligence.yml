name: Research intelligence

on:
  push:
    paths:
      - "data/achievements.json"
      - "data/evidence-register.json"
      - "data/research-queue.json"
      - "data/official-document-monitor.json"
      - "data/claims.json"
      - "data/contradictions.json"
      - "scripts/build_research_intelligence.py"
      - "docs/claim-register.md"
      - "docs/contradiction-ledger.md"
      - "docs/evidence-coverage.md"
      - "docs/research-priorities.md"
      - "docs/change-impact-map.md"
      - "api/claims.json"
      - "api/contradictions.json"
      - "api/coverage.json"
      - "api/priorities.json"
      - "api/change-impact.json"
      - ".github/workflows/research-intelligence.yml"
  pull_request:
    paths:
      - "data/achievements.json"
      - "data/evidence-register.json"
      - "data/research-queue.json"
      - "data/official-document-monitor.json"
      - "data/claims.json"
      - "data/contradictions.json"
      - "scripts/build_research_intelligence.py"
      - "docs/claim-register.md"
      - "docs/contradiction-ledger.md"
      - "docs/evidence-coverage.md"
      - "docs/research-priorities.md"
      - "docs/change-impact-map.md"
      - "api/claims.json"
      - "api/contradictions.json"
      - "api/coverage.json"
      - "api/priorities.json"
      - "api/change-impact.json"
      - ".github/workflows/research-intelligence.yml"
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Validate generated research intelligence
        run: python scripts/build_research_intelligence.py --check
