name: Phase 63 final generated outputs

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'agent/official-achievement-fragment-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/official-achievement-fragment-recovery
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Regenerate contributor research hub
        run: python scripts/build_research_hub.py
      - name: Remove local validation report
        run: rm -f research-hub-report.md
      - name: Commit generated outputs
        run: |
          if git diff --quiet; then
            echo "No generated-output changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 63: refresh contributor research outputs"
          git push origin HEAD:agent/official-achievement-fragment-recovery
