name: Live evidence backlog sweep

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  collect:
    if: github.head_ref == 'agent/resolve-evidence-backlogs' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out evidence branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/resolve-evidence-backlogs
          fetch-depth: 0
      - name: Collect GitHub-owned backlog evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/collect_live_backlog_evidence.py || test -f research/live-backlog-sweep.json
          python scripts/enrich_pair_merge_evidence.py
          python -m scripts.collect_starstruck_transfer_candidates
      - name: Apply canonical reconciliation
        run: |
          python scripts/apply_backlog_reconciliation.py
          python scripts/build_research_hub.py
          python scripts/build_research_intelligence.py
          python scripts/build_evidence_operations.py
          python scripts/build_evidence_quality_programme.py
          python scripts/build_evidence_intelligence.py
          python scripts/build_public_api.py
      - name: Remove temporary collection infrastructure
        run: |
          rm -f \
            .github/workflows/live-evidence-backlog-sweep.yml \
            research/live-backlog-sweep.json \
            scripts/apply_backlog_reconciliation.py \
            scripts/collect_live_backlog_evidence.py \
            scripts/collect_starstruck_transfer_candidates.py \
            scripts/enrich_pair_merge_evidence.py
      - name: Commit reconciled backlog
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo 'Backlog reconciliation is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Reconcile remaining evidence backlogs'
          git push origin HEAD:agent/resolve-evidence-backlogs
