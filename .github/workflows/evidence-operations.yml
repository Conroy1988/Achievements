name: Evidence operations

on:
  push:
    branches:
      - main
    paths:
      - "data/research-queue.json"
      - "data/claims.json"
      - "data/contradictions.json"
      - "data/reproduction-protocols.json"
      - "data/profile-auditor-rules.json"
      - "data/evidence-submission.schema.json"
      - "scripts/build_evidence_operations.py"
      - "docs/reproduction-lab.md"
      - "profile-auditor.md"
      - "research-command-centre.md"
      - "evidence-submission.md"
      - "assets/js/profile-auditor.js"
      - "assets/js/research-command-centre.js"
      - "assets/css/research-operations.css"
      - "api/lab-protocols.json"
      - "api/auditor-rules.json"
      - "api/submission-schema.json"
      - "api/command-centre.json"
      - ".github/workflows/evidence-operations.yml"
  pull_request:
    paths:
      - "data/research-queue.json"
      - "data/claims.json"
      - "data/contradictions.json"
      - "data/reproduction-protocols.json"
      - "data/profile-auditor-rules.json"
      - "data/evidence-submission.schema.json"
      - "scripts/build_evidence_operations.py"
      - "docs/reproduction-lab.md"
      - "profile-auditor.md"
      - "research-command-centre.md"
      - "evidence-submission.md"
      - "assets/js/profile-auditor.js"
      - "assets/js/research-command-centre.js"
      - "assets/css/research-operations.css"
      - "api/lab-protocols.json"
      - "api/auditor-rules.json"
      - "api/submission-schema.json"
      - "api/command-centre.json"
      - ".github/workflows/evidence-operations.yml"
  schedule:
    - cron: "37 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate evidence operations
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Validate generated evidence operations
        run: python scripts/build_evidence_operations.py --check
