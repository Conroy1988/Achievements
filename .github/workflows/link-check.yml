name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
      - '**/*.yml'
      - '**/*.yaml'
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate repository links
        shell: python
        run: |
          from pathlib import Path
          from urllib.parse import unquote, urlsplit
          import re
          import sys

          root = Path.cwd()
          link_pattern = re.compile(r'!?\[[^\]]*\]\(([^)]+)\)')
          failures = []

          def candidate_paths(source: Path, raw_target: str):
              target = raw_target.strip().split()[0].strip('<>')
              if not target or '{{' in target or '}}' in target:
                  return []
              if target.startswith(('#', 'mailto:', 'tel:')):
                  return []
              parsed = urlsplit(target)
              if parsed.scheme or parsed.netloc:
                  return []

              path_text = unquote(parsed.path)
              if not path_text:
                  return []
              if path_text.startswith('/Achievements/'):
                  return []

              if path_text.startswith('/'):
                  path = root / path_text.lstrip('/')
              else:
                  path = source.parent / path_text

              candidates = [path]
              if path.suffix == '.html':
                  candidates.append(path.with_suffix('.md'))
              if path_text.endswith('/'):
                  candidates.extend([path / 'index.md', path.with_suffix('.md')])
              elif not path.suffix:
                  candidates.extend([path.with_suffix('.md'), path / 'index.md'])
              return candidates

          for source in sorted(root.rglob('*.md')):
              if '.git' in source.parts:
                  continue
              text = source.read_text(encoding='utf-8')
              for match in link_pattern.finditer(text):
                  target = match.group(1)
                  candidates = candidate_paths(source, target)
                  if candidates and not any(candidate.exists() for candidate in candidates):
                      line = text.count('\n', 0, match.start()) + 1
                      shown = ', '.join(str(c.relative_to(root)) for c in candidates)
                      failures.append(f'{source.relative_to(root)}:{line}: {target} -> checked {shown}')

          if failures:
              print('Broken repository links:')
              print('\n'.join(f'- {failure}' for failure in failures))
              sys.exit(1)

          print('All repository-relative Markdown links resolved successfully.')
