name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
      - 'scripts/check_links.py'
      - '.github/workflows/link-check.yml'
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Validate repository links
        run: python scripts/check_links.py
