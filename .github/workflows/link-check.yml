name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.html'
      - 'scripts/check_links.py'
      - '.github/workflows/link-check.yml'
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Validate changed Markdown links
        if: github.event_name == 'pull_request'
        run: python scripts/check_links.py
      - name: Validate full repository link baseline
        if: github.event_name != 'pull_request'
        run: python scripts/check_links.py --all
