name: Evidence submission triage

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    name: Validate and stage evidence
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[Evidence]')
    runs-on: ubuntu-latest
    concurrency:
      group: evidence-triage-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Triage submission
        if: github.event_name == 'issues'
        run: python scripts/triage_evidence_submission.py --event "$GITHUB_EVENT_PATH" --output triage-output
      - name: Upload triage artefacts
        if: github.event_name == 'issues'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evidence-triage-${{ github.event.issue.number }}
          path: triage-output
          retention-days: 30
      - name: Comment blocked submission
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          status="$(jq -r '.status' triage-output/result.json)"
          if [[ "$status" != "blocked" ]]; then
            exit 0
          fi
          jq -n --rawfile body triage-output/summary.md '{body: $body}' \
            | gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.issue.number }}/comments" --input -
      - name: Create or update evidence branch
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          status="$(jq -r '.status' triage-output/result.json)"
          if [[ "$status" != "accepted-for-human-review" ]]; then
            exit 0
          fi

          branch="evidence/issue-${ISSUE_NUMBER}"
          target="triage/drafts/issue-${ISSUE_NUMBER}.json"
          git checkout -B "$branch"
          mkdir -p triage/drafts
          cp triage-output/draft-evidence-record.json "$target"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$target"
          if [[ -n "$(git status --porcelain -- "$target")" ]]; then
            git commit -m "Stage evidence submission #${ISSUE_NUMBER}"
          fi
          git push --force-with-lease --set-upstream origin "$branch"

          pr_url="$(gh pr list --head "$branch" --state open --json url --jq '.[0].url // empty')"
          if [[ -z "$pr_url" ]]; then
            pr_url="$(gh pr create \
              --draft \
              --base main \
              --head "$branch" \
              --title "Evidence triage: issue #${ISSUE_NUMBER}" \
              --body-file triage-output/summary.md)"
          fi

          body="Automated screening passed and a draft pull request was prepared for human review: ${pr_url}"
          jq -n --arg body "$body" '{body: $body}' \
            | gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" --input -
