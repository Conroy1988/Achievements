name: Evidence intelligence

on:
  pull_request:
    paths:
      - 'api/coverage.json'
      - 'api/event-linked-evidence.json'
      - 'api/threshold-boundaries.json'
      - 'api/adjudication.json'
      - 'api/contradiction-assessments.json'
      - 'api/release-readiness.json'
      - 'api/evidence-intelligence.json'
      - 'docs/evidence-intelligence-dashboard.md'
      - 'scripts/build_evidence_intelligence.py'
      - '.github/workflows/evidence-intelligence.yml'
  push:
    branches:
      - main
    paths:
      - 'api/coverage.json'
      - 'api/event-linked-evidence.json'
      - 'api/threshold-boundaries.json'
      - 'api/adjudication.json'
      - 'api/contradiction-assessments.json'
      - 'api/release-readiness.json'
      - 'api/evidence-intelligence.json'
      - 'docs/evidence-intelligence-dashboard.md'
      - 'scripts/build_evidence_intelligence.py'
      - '.github/workflows/evidence-intelligence.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate evidence intelligence
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate generated intelligence
        run: |
          python scripts/build_evidence_intelligence.py --check --report evidence-intelligence-report.md
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evidence-intelligence-validation
          path: evidence-intelligence-report.md
          if-no-files-found: warn
          retention-days: 30
