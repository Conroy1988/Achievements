name: Phase 62 branch cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/public-reconstruction-evidence-lift' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/public-reconstruction-evidence-lift
          fetch-depth: 0
      - name: Remove transient reports and restore compact mission source
        run: |
          rm -f \
            acquisition-missions-report.md \
            evidence-intelligence-report.md \
            evidence-operations-report.md \
            evidence-quality-programme-report.md \
            evidence-register-report.md \
            mission-intake-report.md \
            mission-review-report.md \
            phase62-reconcile.log \
            promotion-planner-report.md \
            public-reconstruction-report.md \
            research-intelligence-report.md
          python - <<'PY'
          from pathlib import Path
          import json
          path = Path('data/acquisition-missions.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          path.write_text(json.dumps(value, separators=(',', ':'), ensure_ascii=False) + '\n', encoding='utf-8')
          PY
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No cleanup required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 62: remove reconciliation transport files"
          git push origin HEAD:agent/public-reconstruction-evidence-lift
