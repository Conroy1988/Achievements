name: Catalogue backlog sync

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/resolve-evidence-backlogs' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out backlog branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/resolve-evidence-backlogs
          fetch-depth: 0
      - name: Synchronise catalogue metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/achievements.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          rows = {row['slug']: row for row in value['achievements']}

          rows['yolo']['last_verified'] = '2026-07-20'
          rows['yolo']['known_limitations'] = [
              'A requested reviewer is distinct from a submitted review; submitted COMMENT, REQUEST_CHANGES, APPROVE, dismissed, and automated review states remain under investigation.',
              'Protected branches may correctly prevent the qualifying sequence.'
          ]

          rows['pair-extraordinaire']['last_verified'] = '2026-07-20'
          rows['pair-extraordinaire']['known_limitations'] = [
              'Squash merging can preserve attribution when the final commit retains an account-linked Co-authored-by trailer; rebase, stripped-trailer, email-mismatch, and later rewrite cases remain incomplete.',
              'Exact tier boundaries, private-repository behavior, and unusual merge strategies are not comprehensively documented.'
          ]

          rows['starstruck']['last_verified'] = '2026-07-20'
          rows['starstruck']['sources']['official'] = [
              'https://github.com/users/Schweinepriester/achievements/starstruck/detail?hovercard=1',
              'https://github.com/users/balloob/achievements/starstruck/detail?hovercard=1',
              'https://github.com/users/tiangolo/achievements/starstruck/detail?hovercard=1'
          ]
          rows['starstruck']['known_limitations'] = [
              'Current organization ownership does not necessarily erase creator attribution, but the exact transfer timing relative to milestone processing is not exposed.',
              'Forks, archival, falling counts, deletion, restoration, and award or tier revocation remain incompletely documented.'
          ]

          path.write_text(json.dumps(value, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          python scripts/build_public_api.py
      - name: Remove temporary workflow
        run: rm -f .github/workflows/catalogue-backlog-sync.yml
      - name: Commit catalogue sync
        run: |
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Synchronise backlog catalogue metadata'
          git push origin HEAD:agent/resolve-evidence-backlogs
