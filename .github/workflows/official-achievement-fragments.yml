name: Official achievement fragments

on:
  pull_request:
    paths:
      - 'data/official-achievement-fragments.json'
      - 'data/claims.json'
      - 'data/contradictions.json'
      - 'api/official-achievement-fragments.json'
      - 'docs/official-achievement-fragments.md'
      - 'scripts/build_official_achievement_fragments.py'
      - '.github/workflows/official-achievement-fragments.yml'
  push:
    branches:
      - main
    paths:
      - 'data/official-achievement-fragments.json'
      - 'data/claims.json'
      - 'data/contradictions.json'
      - 'api/official-achievement-fragments.json'
      - 'docs/official-achievement-fragments.md'
      - 'scripts/build_official_achievement_fragments.py'
      - '.github/workflows/official-achievement-fragments.yml'
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate official fragment corpus
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Validate canonical corpus and generated outputs
        run: python scripts/build_official_achievement_fragments.py --check --report official-achievement-fragments-report.md
      - name: Verify live GitHub fragment fingerprints
        run: |
          mkdir -p live-fragments
          curl --retry 3 --retry-all-errors --location --silent --show-error \
            --user-agent 'Mozilla/5.0 GitHub-Achievement-Encyclopedia-Monitor' \
            --cookie-jar live-fragments/cookies.txt \
            --output live-fragments/session.html \
            'https://github.com/Schweinepriester?tab=achievements'
          python - <<'PY'
          from __future__ import annotations

          from html.parser import HTMLParser
          from http.cookiejar import MozillaCookieJar
          from pathlib import Path
          from urllib.request import Request, build_opener, HTTPCookieProcessor
          import hashlib
          import json
          import re
          import time

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.parts = []
              def handle_data(self, value):
                  self.parts.append(value)

          corpus = json.loads(Path('data/official-achievement-fragments.json').read_text(encoding='utf-8'))
          jar = MozillaCookieJar('live-fragments/cookies.txt')
          jar.load(ignore_discard=True, ignore_expires=True)
          opener = build_opener(HTTPCookieProcessor(jar))
          failures = []
          for row in corpus['records']:
              profile = f"https://github.com/{row['subject_login']}?tab=achievements"
              request = Request(
                  row['detail_url'],
                  headers={
                      'Accept': 'text/html',
                      'Referer': profile,
                      'User-Agent': 'Mozilla/5.0 GitHub-Achievement-Encyclopedia-Monitor',
                      'X-Requested-With': 'XMLHttpRequest',
                  },
              )
              body = None
              for attempt in range(3):
                  try:
                      with opener.open(request, timeout=30) as response:
                          body = response.read().decode('utf-8', errors='replace')
                      break
                  except Exception as error:
                      if attempt == 2:
                          failures.append(f"{row['id']}: fetch failed: {error}")
                      else:
                          time.sleep(2 ** attempt)
              if body is None:
                  continue
              parser = TextParser()
              parser.feed(body)
              normalized = re.sub(r'\s+', ' ', ' '.join(parser.parts)).strip()
              digest = hashlib.sha256(normalized.encode('utf-8')).hexdigest()
              if digest != row['normalized_text_sha256']:
                  failures.append(f"{row['id']}: normalized fragment fingerprint drift")
              if row['criterion_text'].lower() not in normalized.lower():
                  failures.append(f"{row['id']}: criterion text missing from live fragment")
              for milestone in row['milestones']:
                  if str(milestone) not in normalized:
                      failures.append(f"{row['id']}: milestone {milestone} missing from live fragment")
          if failures:
              raise SystemExit('\n'.join(failures))
          print(f"Verified {len(corpus['records'])} GitHub-owned live fragment fingerprints.")
          PY
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: official-achievement-fragment-validation
          path: official-achievement-fragments-report.md
          if-no-files-found: warn
          retention-days: 30
