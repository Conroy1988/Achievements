name: Phase 63 official evidence reconciliation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'agent/official-achievement-fragment-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/official-achievement-fragment-recovery
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply official fragment reconciliation
        id: reconcile
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/phase63_apply.py 2>&1 | tee phase63-reconcile.log
      - name: Upload reconciliation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase63-reconciliation-diagnostics
          path: phase63-reconcile.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail on reconciliation error
        if: steps.reconcile.outcome != 'success'
        run: exit 1
      - name: Commit reconciled sources and outputs
        run: |
          if git diff --quiet; then
            echo "No reconciliation changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 63: reconcile GitHub-owned achievement contracts"
          git push origin HEAD:agent/official-achievement-fragment-recovery
