name: Phase 62 reconciliation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'agent/public-reconstruction-evidence-lift' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/public-reconstruction-evidence-lift
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Apply source reconciliation and regenerate outputs
        run: python scripts/phase62_apply.py
      - name: Commit reconciled sources and outputs
        run: |
          if git diff --quiet; then
            echo "No reconciliation changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 62: reconcile public reconstruction evidence"
          git push origin HEAD:agent/public-reconstruction-evidence-lift
