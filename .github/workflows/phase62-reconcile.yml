name: Phase 62 reconciliation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'agent/public-reconstruction-evidence-lift' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/public-reconstruction-evidence-lift
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Align temporary runner with live command-centre wording
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/phase62_apply.py')
          text = path.read_text(encoding='utf-8')
          old = "The [mission evidence promotion planner](docs/promotion-planner.md) converts only accepted promotion proposals into isolated canonical-change previews with impact and rollback instructions; it never applies them."
          new = "The [mission evidence promotion planner](docs/promotion-planner.md) converts only accepted proposals into isolated canonical change plans with impact previews, validation steps, and rollback instructions. It never applies those plans automatically."
          if old not in text:
              raise SystemExit('temporary runner anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Apply source reconciliation and regenerate outputs
        id: reconcile
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/phase62_apply.py 2>&1 | tee phase62-reconcile.log
      - name: Upload reconciliation diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase62-reconciliation-diagnostics
          path: phase62-reconcile.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail on reconciliation error
        if: steps.reconcile.outcome != 'success'
        run: exit 1
      - name: Commit reconciled sources and outputs
        run: |
          if git diff --quiet; then
            echo "No reconciliation changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Phase 62: reconcile public reconstruction evidence"
          git push origin HEAD:agent/public-reconstruction-evidence-lift
