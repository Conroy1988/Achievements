name: Verification timelines

on:
  pull_request:
    paths:
      - 'data/verification-timelines.json'
      - 'docs/verification-timelines.md'
      - 'api/timelines.json'
      - 'scripts/build_verification_timelines.py'
      - '.github/workflows/verification-timelines.yml'
  push:
    branches:
      - main
    paths:
      - 'data/verification-timelines.json'
      - 'docs/verification-timelines.md'
      - 'api/timelines.json'
      - 'scripts/build_verification_timelines.py'
      - '.github/workflows/verification-timelines.yml'
  workflow_dispatch:
  schedule:
    - cron: '31 7 * * 1'

permissions:
  contents: read

jobs:
  validate:
    name: Validate verification timelines
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate timelines and generated outputs
        run: python scripts/build_verification_timelines.py --check --report verification-timeline-report.md
      - name: Upload timeline report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verification-timeline-validation
          path: verification-timeline-report.md
          if-no-files-found: warn
          retention-days: 30

  initialise:
    name: Generate Phase 37 timeline outputs
    if: github.event_name == 'pull_request' && github.head_ref == 'phase-37/verification-timelines'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Phase 37 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
      - name: Generate timeline outputs once
        run: |
          if [[ -f docs/verification-timelines.md && -f api/timelines.json ]]; then
            echo 'Timeline outputs already exist.'
            exit 0
          fi
          python scripts/build_verification_timelines.py
      - name: Commit generated outputs
        run: |
          if [[ -z "$(git status --porcelain -- docs/verification-timelines.md api/timelines.json)" ]]; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/verification-timelines.md api/timelines.json
          git commit -m 'Phase 37: generate verification timelines'
          git push
