name: Mission execution intake

on:
  pull_request:
    paths:
      - '.github/ISSUE_TEMPLATE/mission-evidence.yml'
      - '.github/workflows/mission-evidence-triage.yml'
      - '.github/workflows/mission-execution-intake.yml'
      - 'data/mission-evidence-submission.schema.json'
      - 'api/acquisition-missions.json'
      - 'api/mission-submission-schema.json'
      - 'docs/mission-execution-intake.md'
      - 'scripts/build_mission_intake.py'
      - 'scripts/triage_mission_submission.py'
      - 'tests/test_mission_submission.py'
  push:
    branches:
      - main
    paths:
      - '.github/ISSUE_TEMPLATE/mission-evidence.yml'
      - '.github/workflows/mission-evidence-triage.yml'
      - '.github/workflows/mission-execution-intake.yml'
      - 'data/mission-evidence-submission.schema.json'
      - 'api/acquisition-missions.json'
      - 'api/mission-submission-schema.json'
      - 'docs/mission-execution-intake.md'
      - 'scripts/build_mission_intake.py'
      - 'scripts/triage_mission_submission.py'
      - 'tests/test_mission_submission.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate mission intake
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Validate generated intake surfaces
        run: python scripts/build_mission_intake.py --check --report mission-intake-report.md
      - name: Compile triage code
        run: python -m py_compile scripts/build_mission_intake.py scripts/triage_mission_submission.py
      - name: Run mission triage tests
        run: python -m unittest tests/test_mission_submission.py
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mission-execution-intake-validation
          path: mission-intake-report.md
          if-no-files-found: warn
          retention-days: 30
