name: Contributor research hub

on:
  pull_request:
    paths:
      - 'data/research-queue.json'
      - 'docs/research-hub.md'
      - 'api/research-queue.json'
      - 'scripts/build_research_hub.py'
      - '.github/ISSUE_TEMPLATE/research-task.yml'
      - '.github/workflows/research-hub.yml'
  push:
    branches:
      - main
    paths:
      - 'data/research-queue.json'
      - 'docs/research-hub.md'
      - 'api/research-queue.json'
      - 'scripts/build_research_hub.py'
      - '.github/ISSUE_TEMPLATE/research-task.yml'
      - '.github/workflows/research-hub.yml'
  workflow_dispatch:
  schedule:
    - cron: '47 7 * * 1'

permissions:
  contents: read

jobs:
  validate:
    name: Validate contributor research queue
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate queue and generated outputs
        run: python scripts/build_research_hub.py --check --report research-hub-report.md
      - name: Upload research validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: contributor-research-validation
          path: research-hub-report.md
          if-no-files-found: warn
          retention-days: 30

  initialise:
    name: Generate Phase 38 research outputs
    if: github.event_name == 'pull_request' && github.head_ref == 'phase-38/contributor-research-hub'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Phase 38 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
      - name: Generate research outputs once
        run: |
          if [[ -f docs/research-hub.md && -f api/research-queue.json ]]; then
            echo 'Research outputs already exist.'
            exit 0
          fi
          python scripts/build_research_hub.py
      - name: Commit generated outputs
        run: |
          if [[ -z "$(git status --porcelain -- docs/research-hub.md api/research-queue.json)" ]]; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/research-hub.md api/research-queue.json
          git commit -m 'Phase 38: generate contributor research hub'
          git push
