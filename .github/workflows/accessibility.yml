name: Accessibility check

on:
  workflow_dispatch:
  schedule:
    - cron: '43 7 * * 1'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.html'
      - 'assets/css/**'
      - '_layouts/**'
      - '_config.yml'

permissions:
  contents: read

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
      - name: Install pa11y-ci
        run: npm install --global pa11y-ci
      - name: Wait for deployed pages
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error https://conroy1988.github.io/Achievements/ >/dev/null; then
              exit 0
            fi
            sleep 30
          done
          exit 1
      - name: Audit deployed pages
        run: |
          pa11y-ci \
            https://conroy1988.github.io/Achievements/ \
            https://conroy1988.github.io/Achievements/achievements/pull-shark/ \
            https://conroy1988.github.io/Achievements/faq/ \
            https://conroy1988.github.io/Achievements/contribute/ \
            --standard WCAG2AA \
            --threshold 0