name: Phase 65 changelog cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/phase-65-v1.5-campaign-reset' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Phase 65 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/phase-65-v1.5-campaign-reset
      - name: Consolidate changelog headings
        run: python scripts/fix_phase65_changelog.py
      - name: Remove cleanup infrastructure
        run: |
          rm -f scripts/fix_phase65_changelog.py
          rm -f .github/workflows/phase-65-changelog-cleanup.yml
      - name: Commit changelog cleanup
        run: |
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Clean up Phase 65 changelog section'
          git push origin HEAD:agent/phase-65-v1.5-campaign-reset
