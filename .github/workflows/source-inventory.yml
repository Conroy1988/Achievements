name: Source inventory

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'scripts/build_source_inventory.py'
      - '.github/workflows/source-inventory.yml'
  pull_request:
    paths:
      - '**/*.md'
      - 'scripts/build_source_inventory.py'
      - '.github/workflows/source-inventory.yml'
  workflow_dispatch:
  schedule:
    - cron: '11 7 1 * *'

permissions:
  contents: read

jobs:
  inventory:
    name: Build source resilience inventory
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build inventory
        shell: bash
        run: |
          args=(--csv source-inventory.csv --markdown source-inventory.md)
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            args+=(--check-availability)
          fi
          python scripts/build_source_inventory.py "${args[@]}"
      - name: Upload source inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-inventory
          path: |
            source-inventory.csv
            source-inventory.md
          if-no-files-found: error
          retention-days: 30
