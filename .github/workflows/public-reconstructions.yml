name: Public reconstructions

on:
  pull_request:
    paths:
      - 'data/public-reconstructions.json'
      - 'data/claims.json'
      - 'api/public-reconstructions.json'
      - 'docs/public-reconstruction-corpus.md'
      - 'scripts/build_public_reconstructions.py'
      - '.github/workflows/public-reconstructions.yml'
  push:
    branches:
      - main
    paths:
      - 'data/public-reconstructions.json'
      - 'data/claims.json'
      - 'api/public-reconstructions.json'
      - 'docs/public-reconstruction-corpus.md'
      - 'scripts/build_public_reconstructions.py'
      - '.github/workflows/public-reconstructions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate public reconstructions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
      - name: Validate corpus and generated outputs
        run: python scripts/build_public_reconstructions.py --check --report public-reconstruction-report.md
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: public-reconstruction-validation
          path: public-reconstruction-report.md
          if-no-files-found: warn
          retention-days: 30
