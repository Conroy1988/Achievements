name: Content quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'Gemfile'
      - '_config.yml'
      - '.markdownlint-cli2.yaml'
      - 'scripts/check_achievement_catalog.py'
      - 'scripts/check_verification_dates.py'
      - '.github/workflows/content-quality.yml'
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '29 6 * * 1'

permissions:
  contents: read

jobs:
  verification-metadata-fix:
    name: Complete verification metadata
    if: github.event_name == 'pull_request' && github.head_ref == 'phase-25/verification-date-report'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Phase 25 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Add missing Starstruck verification date
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('achievements/starstruck.md')
          text = path.read_text(encoding='utf-8')
          if '## Last verified' not in text:
              marker = '\n[Back to the achievement index]'
              addition = (
                  '\n## Last verified\n\n'
                  '**19 July 2026** — reviewed community-reported star thresholds, '
                  'repository association conditions, award timing, and legitimate growth guidance.\n'
              )
              text = text.replace(marker, addition + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit metadata correction
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add achievements/starstruck.md
          git commit -m "Phase 25: date Starstruck verification"
          git push

  markdown:
    name: Markdown baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate all Markdown files
        run: |
          touch markdownlint-report.txt
          set +e
          npx --yes markdownlint-cli2@0.18.1 "**/*.md" 2>&1 | tee markdownlint-report.txt
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdownlint-report
          path: markdownlint-report.txt
          if-no-files-found: error
          retention-days: 14

  catalogue:
    name: Achievement catalogue
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Compare index and navigation hub
        run: python scripts/check_achievement_catalog.py

  verification-dates:
    name: Verification date freshness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Generate verification date report
        run: python scripts/check_verification_dates.py --output verification-date-report.md
      - name: Upload verification date report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-date-report
          path: verification-date-report.md
          if-no-files-found: error
          retention-days: 30

  jekyll:
    name: Jekyll build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build with GitHub Pages
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
