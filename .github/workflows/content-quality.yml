name: Content quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'Gemfile'
      - '_config.yml'
      - '.markdownlint-cli2.yaml'
      - 'scripts/check_achievement_catalog.py'
      - '.github/workflows/content-quality.yml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown style
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Run markdownlint on changed files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR HEAD^ HEAD -- '*.md')
          if (( ${#files[@]} == 0 )); then
            echo "No changed Markdown files to validate."
            exit 0
          fi
          printf 'Validating %s\n' "${files[@]}"
          npx --yes markdownlint-cli2@0.18.1 "${files[@]}"

  catalogue:
    name: Achievement catalogue
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Compare index and navigation hub
        run: python scripts/check_achievement_catalog.py

  jekyll:
    name: Jekyll build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build with GitHub Pages
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
