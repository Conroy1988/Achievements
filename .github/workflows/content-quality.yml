name: Content quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'data/*.json'
      - 'Gemfile'
      - '_config.yml'
      - '.markdownlint-cli2.yaml'
      - 'scripts/check_achievement_catalog.py'
      - 'scripts/check_verification_dates.py'
      - 'scripts/validate_achievement_data.py'
      - '.github/workflows/content-quality.yml'
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '29 6 * * 1'

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate all Markdown files
        run: |
          touch markdownlint-report.txt
          set +e
          npx --yes markdownlint-cli2@0.18.1 "**/*.md" 2>&1 | tee markdownlint-report.txt
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: markdownlint-report
          path: markdownlint-report.txt
          if-no-files-found: error
          retention-days: 14

  catalogue:
    name: Achievement catalogue
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Compare index and navigation hub
        run: python scripts/check_achievement_catalog.py

  achievement-data:
    name: Achievement data contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate dataset, schema, guides, and catalogue
        run: python scripts/validate_achievement_data.py --report achievement-data-report.md
      - name: Upload achievement data report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: achievement-data-report
          path: achievement-data-report.md
          if-no-files-found: error
          retention-days: 30

  verification-dates:
    name: Verification date freshness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Generate verification date report
        run: python scripts/check_verification_dates.py --output verification-date-report.md
      - name: Upload verification date report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verification-date-report
          path: verification-date-report.md
          if-no-files-found: error
          retention-days: 30

  jekyll:
    name: Jekyll build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build with GitHub Pages
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site