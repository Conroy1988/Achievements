name: Content quality

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'Gemfile'
      - '_config.yml'
      - '.markdownlint-cli2.yaml'
      - 'scripts/check_achievement_catalog.py'
      - '.github/workflows/content-quality.yml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-debt-fix:
    name: Apply Markdown debt fixes
    if: github.event_name == 'pull_request' && github.head_ref == 'phase-24/markdown-baseline'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out Phase 24 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply deterministic formatting corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              'achievements/galaxy-brain.md',
              'achievements/pair-extraordinaire.md',
              'achievements/public-sponsor.md',
              'achievements/pull-shark.md',
              'achievements/quickdraw.md',
              'achievements/starstruck.md',
              'achievements/yolo.md',
              'contribute.md',
              'docs/deployment-audit.md',
              'docs/first-contribution.md',
              'evidence-submission.md',
              'faq.md',
              'history/retired-achievements.md',
              'index.md',
              'site-map.md',
          ]

          for name in files:
              path = Path(name)
              lines = path.read_text(encoding='utf-8').splitlines()
              for index, line in enumerate(lines):
                  if line.startswith('# '):
                      lines[index] = '## ' + line[2:]
                      break
              else:
                  raise RuntimeError(f'No top-level heading found in {name}')
              path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          Path('docs/gold-roadmap.md').write_text(
              '# Pull Shark Gold Roadmap\n\n'
              '## Objective\n\n'
              'Track progress from 128 merged pull requests toward the community-reported Gold threshold of 1,024.\n\n'
              '## Working rules\n\n'
              '- Every pull request must contain a useful repository change.\n'
              '- Avoid empty, duplicated, or whitespace-only changes.\n'
              '- Record progress only after GitHub reports a pull request as merged.\n'
              '- Keep documentation navigable as the repository grows.\n\n'
              '## Milestones\n\n'
              'Use 128-PR checkpoints: 256, 384, 512, 640, 768, 896, and 1,024.\n',
              encoding='utf-8',
          )
          PY
      - name: Commit corrected Markdown
        run: |
          if git diff --quiet; then
            echo "No Markdown debt remained to correct."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.md'
          git commit -m "Phase 24: resolve Markdown baseline debt"
          git push

  markdown:
    name: Markdown baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Validate all Markdown files
        run: |
          touch markdownlint-report.txt
          set +e
          npx --yes markdownlint-cli2@0.18.1 "**/*.md" 2>&1 | tee markdownlint-report.txt
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdownlint-report
          path: markdownlint-report.txt
          if-no-files-found: error
          retention-days: 14

  catalogue:
    name: Achievement catalogue
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Compare index and navigation hub
        run: python scripts/check_achievement_catalog.py

  jekyll:
    name: Jekyll build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build with GitHub Pages
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
