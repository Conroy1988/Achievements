<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Achievement Encyclopedia</title>
  <desc id="desc">A premium dark banner with a gold achievement medallion and the words Evidence-led guides, verified claims, preserved history.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070a0f"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#17113a"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a371f7" stop-opacity=".28"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset=".42" stop-color="#f6c453"/>
      <stop offset="1" stop-color="#b7791f"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f4d14"/>
      <stop offset="1" stop-color="#2d210b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".025"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity=".035"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="480" rx="28" fill="url(#background)"/>
  <rect width="1440" height="480" rx="28" fill="url(#grid)"/>
  <ellipse cx="1150" cy="80" rx="390" ry="300" fill="url(#blueGlow)"/>
  <ellipse cx="1280" cy="470" rx="380" ry="280" fill="url(#violetGlow)"/>

  <path d="M0 410C210 346 356 460 566 404S914 292 1148 346s292 7 292 7v127H0Z" fill="#58a6ff" opacity=".045"/>
  <path d="M0 438c250-56 383 29 598-9 244-42 401-101 602-52 89 22 166 20 240 0v103H0Z" fill="#a371f7" opacity=".05"/>

  <g opacity=".42">
    <circle cx="75" cy="70" r="3" fill="#f6c453"/>
    <circle cx="1330" cy="82" r="3" fill="#79c0ff"/>
    <circle cx="1380" cy="185" r="2" fill="#d2a8ff"/>
    <circle cx="1010" cy="62" r="2" fill="#f6c453"/>
    <circle cx="1160" cy="424" r="2" fill="#79c0ff"/>
    <path d="M91 104h34M108 87v34" stroke="#f6c453" stroke-width="2" stroke-linecap="round"/>
    <path d="M1348 330h26M1361 317v26" stroke="#79c0ff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(88 74)">
    <rect width="760" height="332" rx="28" fill="url(#glass)" stroke="#ffffff" stroke-opacity=".11"/>
    <rect x="1" y="1" width="758" height="330" rx="27" fill="none" stroke="#ffffff" stroke-opacity=".035"/>

    <g transform="translate(42 38)">
      <rect width="186" height="36" rx="18" fill="#f6c453" fill-opacity=".12" stroke="#f6c453" stroke-opacity=".42"/>
      <circle cx="21" cy="18" r="5" fill="#f6c453"/>
      <text x="36" y="24" fill="#ffe89a" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.8">OPEN KNOWLEDGE</text>
    </g>

    <text x="42" y="142" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="-1.6">GitHub Achievement</text>
    <text x="42" y="207" fill="url(#gold)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="64" font-weight="850" letter-spacing="-2">Encyclopedia</text>

    <text x="45" y="260" fill="#c9d1d9" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="20" font-weight="500">Evidence-led guides · verified claims · preserved history</text>

    <g transform="translate(43 285)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">
      <text x="0" y="14" fill="#7ee787">EVIDENCE</text>
      <circle cx="86" cy="9" r="2.5" fill="#6e7681"/>
      <text x="104" y="14" fill="#79c0ff">VERIFICATION</text>
      <circle cx="220" cy="9" r="2.5" fill="#6e7681"/>
      <text x="238" y="14" fill="#d2a8ff">HISTORY</text>
      <circle cx="314" cy="9" r="2.5" fill="#6e7681"/>
      <text x="332" y="14" fill="#f0b72f">COMMUNITY</text>
    </g>
  </g>

  <g transform="translate(1048 240)" filter="url(#shadow)">
    <circle r="154" fill="#0b1220" stroke="#ffffff" stroke-opacity=".09" stroke-width="2"/>
    <circle r="133" fill="url(#goldDark)" stroke="url(#gold)" stroke-width="4"/>
    <circle r="111" fill="#111827" stroke="#f6c453" stroke-opacity=".55" stroke-width="2"/>
    <circle r="91" fill="#0d1117" stroke="#ffffff" stroke-opacity=".09"/>

    <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <path d="M-42-52h84v25c0 38-18 63-42 76-24-13-42-38-42-76Z" stroke-width="8"/>
      <path d="M-42-38h-27c0 28 11 48 35 56M42-38h27c0 28-11 48-35 56" stroke-width="7"/>
      <path d="M0 49v27M-30 78h60" stroke-width="8"/>
      <path d="m0-28 10 20 23 3-17 16 4 23L0 23l-20 11 4-23-17-16 23-3Z" stroke-width="5"/>
    </g>

    <g fill="#f6c453">
      <circle cx="-118" cy="-80" r="3"/>
      <circle cx="116" cy="-72" r="3"/>
      <circle cx="-109" cy="92" r="2.5"/>
      <circle cx="111" cy="91" r="2.5"/>
    </g>
  </g>

  <g transform="translate(1270 355)" opacity=".85">
    <rect x="-67" y="-20" width="134" height="40" rx="20" fill="#0d1117" stroke="#58a6ff" stroke-opacity=".55"/>
    <path d="M-43 0h17l8-10 14 20 12-17 9 7h28" fill="none" stroke="#79c0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <rect x=".75" y=".75" width="1438.5" height="478.5" rx="27.25" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="1.5"/>
</svg>
